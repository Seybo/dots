# Use tmux's modern terminfo entry so apps inside tmux understand tmux features.
set -g default-terminal "tmux-256color"
# Advertise true-color/RGB support so Neovim, Lazygit, and themed CLIs render correct colors.
set -as terminal-features ",*:RGB"
# Keep key-sequence delay low so modal Cmd bindings feel responsive.
set -s escape-time 10
# Keep repeatable tmux actions responsive without making accidental repeats too easy.
set -sg repeat-time 300
# Let terminal apps know when panes gain/lose focus; useful for editors and modern TUIs.
set -g focus-events on
# Enable tmux extended keys so modified Enter/Ctrl/Shift keys can reach apps correctly.
set -g extended-keys on
# Use CSI-u extended-key format for modern terminal/app compatibility.
set -g extended-keys-format csi-u
# Keep a large scrollback buffer so tmux is useful for agent logs and long command output.
set -g history-limit 100000

# Start tmux windows at 1 to match the visible numbering users usually expect.
set -g base-index 1
# Start pane numbers at 1 so pane/window numbering is consistent.
setw -g pane-base-index 1
# Close numbering gaps after a window is removed so the status bar stays tidy.
set -g renumber-windows on
# Do not auto-rename windows because tmuxinator/Zellij-style names are intentional.
setw -g automatic-rename off
# Let tmux set the terminal title so the outer terminal reflects the active tmux context.
set -g set-titles on
# Keep pane titles stable so tmuxinator/autowork names are not overwritten by app title escapes.
set -g allow-set-title off

# Enable mouse support for easier pane/window selection and scrollback during migration.
set -g mouse on
# Prevent accidental pane resizing when dragging/selecting near borders; keyboard resize still works.
unbind-key -T root MouseDrag1Border
# Show the tmux status line so sessions/windows are visible while evaluating tmux.
set -g status on
# Put the status line at the top to stay close to the current Zellij top-bar layout.
set -g status-position top
# Redraw status every 15 seconds to keep it fresh without unnecessary CPU churn.
set -g status-interval 15
# Center the window list so the status line stays balanced and easy to scan.
set -g status-justify centre
# Reserve enough left status space for the session name without crowding the window list.
set -g status-left-length 40
# Reserve enough right status space for time/date while keeping the status simple.
set -g status-right-length 80

# Use vi keys in copy mode because the rest of the terminal workflow is vim-oriented.
setw -g mode-keys vi
# Use vi keys in tmux prompts/menus for consistency with copy mode.
set -g status-keys vi

# Keep the base status formats plain; theme-specific tmux files add colored rounded ends.
set -g status-left ' #S '
# Match the right status style to the left session-name block.
set -g status-right-style 'fg=#2e3440,bg=#81a1c1,bold'
# Keep the right status cheap: show running agent count, replaced by attention alerts when needed.
set -g status-right '#{?#{@agent-attention-labels},#[bg=red#,fg=white#,bold] ⚠ #{@agent-attention-labels} #[default], 🤖 #(~/.dots/no_stow/bin/tmux/agent-attention-notify --agent-count) }'
# Remove agent markers when a pane's process exits, including remain-on-exit panes.
set-hook -g pane-exited 'run-shell -b "~/.dots/no_stow/bin/tmux/agent-attention-notify --pane-exited #{hook_pane}"'
set-hook -g pane-died 'run-shell -b "~/.dots/no_stow/bin/tmux/agent-attention-notify --pane-died #{hook_pane}"'
# Show inactive tabs/windows as index plus name, matching the Zellij-style mental model.
# Agent attention windows stay red until their approval/input prompt disappears.
set -g window-status-format '#{?#{@agent-attention-pane},#[bg=red#,fg=white#,bold],} #I #W #{?#{@agent-attention-pane},#[default],}'
# Show the active tab/window in the same shape; theme files can style it differently.
set -g window-status-current-format '#{?#{@agent-attention-pane},#[bg=red#,fg=white#,bold],} #I #W #{?#{@agent-attention-pane},#[default],}'

# Make Ctrl-b c create a new tab/window in the current pane's directory.
bind-key c new-window -c '#{pane_current_path}'
# Make the default vertical split keep the current pane's directory.
bind-key '"' split-window -v -c '#{pane_current_path}'
# Make the default horizontal split keep the current pane's directory.
bind-key % split-window -h -c '#{pane_current_path}'

# Keep the standard Ctrl-b [ entry into copy mode as a fallback/admin path.
bind-key [ copy-mode
# In vi copy mode, v begins a selection like Vim visual mode.
bind-key -T copy-mode-vi v send -X begin-selection
# In vi copy mode, Ctrl-v toggles rectangular selection like Vim block mode.
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
# In vi copy mode, y copies the selection to the macOS clipboard and exits copy mode.
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'
# In vi copy mode, Escape cancels selection/mode like Vim.
bind-key -T copy-mode-vi Escape send -X cancel
# In vi copy mode, n repeats search downward, matching Zellij search mode.
bind-key -T copy-mode-vi n send -X search-again
# In vi copy mode, Shift-n repeats search upward, matching Zellij search mode.
bind-key -T copy-mode-vi N send -X search-reverse

# Ghostty Cmd-t sends this glyph; enter tab/window mode to match Zellij's modal flow.
bind-key -n '' switch-client -T user-tabs \; display-message 'tabs/windows'
# Ghostty Cmd-s sends this glyph; enter session mode to match Zellij's modal flow.
bind-key -n '' switch-client -T user-sessions \; display-message 'sessions'
# Ghostty Cmd-p sends this glyph; enter pane mode to match Zellij's modal flow.
bind-key -n '' switch-client -T user-panes \; display-message 'panes'
# Ghostty Cmd-/ sends this glyph; enter copy mode and prompt for forward search like Zellij search mode.
bind-key -n '' copy-mode \; command-prompt -p 'search' 'send -X search-forward "%%"'
# Ghostty Cmd-u sends this glyph; switch to the previous tab/window with one keypress.
bind-key -n '' previous-window
# Ghostty Cmd-m sends this glyph; switch to the next tab/window with one keypress.
bind-key -n '' next-window
# Ghostty Cmd-semicolon sends this glyph; enter copy/scrollback mode like Zellij scroll mode.
bind-key -n '' copy-mode
# Ghostty Cmd-h sends this glyph; move focus to the pane on the left.
bind-key -n '' select-pane -L
# Ghostty Cmd-j sends this glyph; move focus to the pane below.
bind-key -n '' select-pane -D
# Ghostty Cmd-k sends this glyph; move focus to the pane above.
bind-key -n '' select-pane -U
# Ghostty Cmd-l sends this glyph; move focus to the pane on the right.
bind-key -n '' select-pane -R
# Ghostty Cmd-Shift-h sends this glyph; resize the pane left.
bind-key -nr '' resize-pane -L 2
# Ghostty Cmd-Shift-j sends this glyph; resize the pane down.
bind-key -nr '' resize-pane -D 2
# Ghostty Cmd-Shift-k sends this glyph; resize the pane up.
bind-key -nr '' resize-pane -U 2
# Ghostty Cmd-Shift-l sends this glyph; resize the pane right.
bind-key -nr '' resize-pane -R 2
# Ghostty Cmd-1 sends this glyph; switch to or start the shaka_gtm1 session.
bind-key -n '󰎤' run-shell '~/.dots/no_stow/bin/tmux/switch-session to shaka_gtm1'
# Ghostty Cmd-2 sends this glyph; switch to or start the shaka_gtm2 session.
bind-key -n '󰎧' run-shell '~/.dots/no_stow/bin/tmux/switch-session to shaka_gtm2'
# Ghostty Cmd-3 sends this glyph; switch to or start the shaka_gtm3 session.
bind-key -n '󰎪' run-shell '~/.dots/no_stow/bin/tmux/switch-session to shaka_gtm3'
# Ghostty Cmd-7 sends this glyph; switch to or start the base session.
bind-key -n '󰎮' run-shell '~/.dots/no_stow/bin/tmux/switch-session to base'
# Ghostty Cmd-9 sends this glyph; switch to or start the my_health session.
bind-key -n '󰎰' run-shell '~/.dots/no_stow/bin/tmux/switch-session to my_health'
# Ghostty Cmd-0 sends this glyph; use tmux's native last/recent session switch.
bind-key -n '󰎠' switch-client -l

# In tab/window mode, Escape exits the mode without doing tmux work.
bind-key -T user-tabs Escape send-keys Escape
# In tab/window mode, j moves to the next tab/window, matching current Zellij habit.
bind-key -T user-tabs j next-window
# In tab/window mode, k moves to the previous tab/window, matching current Zellij habit.
bind-key -T user-tabs k previous-window
# In tab/window mode, n creates a new tab/window in the current directory.
bind-key -T user-tabs n new-window -c '#{pane_current_path}'
# In tab/window mode, r prompts to rename the current tab/window.
bind-key -T user-tabs r command-prompt -I '#W' 'rename-window "%%"'
# In tab/window mode, x asks before killing the current tab/window.
bind-key -T user-tabs x confirm-before -p 'kill-window #W? (y/n)' kill-window
# In tab/window mode, Shift-j moves the current tab/window right and follows it.
bind-key -T user-tabs J swap-window -t +1 \; select-window -t +1
# In tab/window mode, Shift-k moves the current tab/window left and follows it.
bind-key -T user-tabs K swap-window -t -1 \; select-window -t -1

# In pane mode, Escape exits the mode without doing tmux work.
bind-key -T user-panes Escape send-keys Escape
# In pane mode, n splits right, matching Zellij's common new-pane direction.
bind-key -T user-panes n split-window -h -c '#{pane_current_path}'
# In pane mode, Shift-n splits down, giving the alternate split direction.
bind-key -T user-panes N split-window -v -c '#{pane_current_path}'
# In pane mode, Space cycles through tmux's built-in pane layouts.
bind-key -T user-panes Space next-layout
# In pane mode, f toggles zoom/fullscreen for the focused pane.
bind-key -T user-panes f resize-pane -Z
# In pane mode, p toggles pane title labels in the pane borders.
bind-key -T user-panes p if -F '#{==:#{pane-border-status},off}' 'set -g pane-border-status top' 'set -g pane-border-status off'
# In pane mode, r prompts to rename the focused pane title.
bind-key -T user-panes r command-prompt -I '#T' -p 'pane title' 'select-pane -T "%%"'
# In pane mode, x asks before killing the focused pane.
bind-key -T user-panes x confirm-before -p 'kill-pane? (y/n)' kill-pane
# In pane mode, h moves focus left.
bind-key -T user-panes h select-pane -L
# In pane mode, j moves focus down.
bind-key -T user-panes j select-pane -D
# In pane mode, k moves focus up.
bind-key -T user-panes k select-pane -U
# In pane mode, l moves focus right.
bind-key -T user-panes l select-pane -R
# In pane mode, Shift-h swaps with the previous pane, a safe tmux approximation of moving panes.
bind-key -T user-panes H swap-pane -U
# In pane mode, Shift-l swaps with the next pane, a safe tmux approximation of moving panes.
bind-key -T user-panes L swap-pane -D
# In pane mode, Shift-k swaps with the previous pane, a safe tmux approximation of moving panes.
bind-key -T user-panes K swap-pane -U
# In pane mode, Shift-j swaps with the next pane, a safe tmux approximation of moving panes.
bind-key -T user-panes J swap-pane -D

# In session mode, Escape exits the mode without doing tmux work.
bind-key -T user-sessions Escape send-keys Escape
# In session mode, Cmd-s opens tmux's session picker, matching Zellij Cmd-s then Cmd-s.
bind-key -T user-sessions '' choose-tree -s
# In session mode, s also opens tmux's session picker for non-Ghostty and easier keyboard use.
bind-key -T user-sessions s choose-tree -s
# In session mode, f opens tmux-fzf without adding any prefix-based tmux-fzf shortcut.
bind-key -T user-sessions f if-shell 'test -f "$HOME/.tmux/plugins/tmux-fzf/main.sh"' 'run-shell -b "TMUX_FZF_OPTIONS=\"-p -w 85% -h 70% -m\" TMUX_FZF_ORDER=\"session|window|pane|command|keybinding|process\" bash \"$HOME/.tmux/plugins/tmux-fzf/main.sh\""' 'display-message "tmux-fzf missing: install ~/.tmux/plugins/tmux-fzf"'
# In session mode, Cmd-d detaches the current tmux client, matching Zellij Cmd-s then Cmd-d.
bind-key -T user-sessions '' detach-client
# In session mode, d also detaches the current tmux client for non-Ghostty and easier keyboard use.
bind-key -T user-sessions d detach-client
# In session mode, q asks before switching away and killing the old tmux session.
bind-key -T user-sessions q confirm-before -p 'kill session #S and switch back? (y/n)' 'run-shell "$HOME/.dots/no_stow/bin/tmux/kill-current-session \"#{session_name}\""'
# In session mode, r reloads tmux config so setup changes can be tested without restarting sessions.
bind-key -T user-sessions r source-file ~/.tmux.conf \; display-message 'tmux config reloaded'

# Load the active env tmux theme when it exists; -q keeps themes without tmux files safe.
source-file -q ~/.dots/themes/active/tmux.conf
