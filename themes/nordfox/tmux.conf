# Native tmux theme for nordfox.
# Colors derived from local theme files:
# - themes/nordfox/ghostty
# - themes/nordfox/zellij.kdl

# Style the main status bar with nordfox foreground/background.
set -g status-style "fg=#cdcecf,bg=#2e3440"
# Style the session name block with nordfox blue for quick orientation.
set -g status-left-style "fg=#2e3440,bg=#81a1c1,bold"
# Style the right status block with nordfox blue to match the session name block.
set -g status-right-style "fg=#2e3440,bg=#81a1c1,bold"
# Style inactive tabs/windows with subdued nordfox text.
set -g window-status-style "fg=#abb1bb,bg=#2e3440"
# Style the active tab/window with nordfox blue so it is easy to spot.
set -g window-status-current-style "fg=#2e3440,bg=#81a1c1,bold"
# Use Powerline half-circle glyphs with Nordfox colors for rounded status blocks.
# The glyphs require a Nerd Font/Powerline-compatible terminal font.
set -g status-left '#[fg=#81a1c1,bg=#2e3440]#[fg=#2e3440,bg=#81a1c1,bold] #S #[fg=#81a1c1,bg=#2e3440]'
set -g status-right '#{?#{@agent-attention-labels},#[fg=#bf616a#,bg=#2e3440]#[fg=#e5e9f0#,bg=#bf616a#,bold] ⚠ #{@agent-attention-labels} #[fg=#bf616a#,bg=#2e3440],#[fg=#81a1c1#,bg=#2e3440]#[fg=#2e3440#,bg=#81a1c1#,bold] 🤖 #{?#{@agent-running-count},#{@agent-running-count},0} #[fg=#81a1c1#,bg=#2e3440]}'
set -g window-status-format '#{?#{@agent-attention-pane},#[fg=#bf616a#,bg=#2e3440]#[fg=#e5e9f0#,bg=#bf616a#,bold] #I #W #[fg=#bf616a#,bg=#2e3440], #I #W }'
set -g window-status-current-format '#{?#{@agent-attention-pane},#[fg=#bf616a#,bg=#2e3440]#[fg=#e5e9f0#,bg=#bf616a#,bold] #I #W #[fg=#bf616a#,bg=#2e3440],#[fg=#81a1c1#,bg=#2e3440]#[fg=#2e3440#,bg=#81a1c1#,bold] #I #W #[fg=#81a1c1#,bg=#2e3440]}'
# Style inactive pane borders with the nordfox selection/background color.
set -g pane-border-style "fg=#3e4a5b"
# Style the active pane border with nordfox blue.
set -g pane-active-border-style "fg=#81a1c1"
# Use heavier borders so pane focus is easier to see.
set -g pane-border-lines heavy
# Show arrows and half-border colouring for the active pane when useful.
set -g pane-border-indicators both
# Darken inactive panes by about 15% so the focused pane stands out.
set -g window-style "bg=#272c36"
# Keep the focused pane using the theme base background.
set -g window-active-style "bg=#2e3440"
# Style tmux messages with nordfox yellow for high visibility.
set -g message-style "fg=#2e3440,bg=#ebcb8b,bold"
# Style tmux command prompts with nordfox yellow for consistency with messages.
set -g message-command-style "fg=#2e3440,bg=#ebcb8b,bold"
# Style copy/choice mode selection with nordfox green.
set -g mode-style "fg=#2e3440,bg=#a3be8c,bold"
# Style copy-mode search matches with nordfox yellow.
set -g copy-mode-match-style "fg=#2e3440,bg=#ebcb8b"
# Style the current copy-mode search match with nordfox orange.
set -g copy-mode-current-match-style "fg=#2e3440,bg=#c9826b,bold"
