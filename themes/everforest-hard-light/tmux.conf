# Native tmux theme for everforest-hard-light.
# Colors derived from local theme files:
# - themes/everforest-hard-light/ghostty
# - themes/everforest-hard-light/zellij.kdl

# Style the main status bar with the local Everforest light foreground/background.
set -g status-style "fg=#3D484D,bg=#FFFDF6"
# Style the session name block with Everforest blue for quick orientation.
set -g status-left-style "fg=#FFFBEF,bg=#3A94C5,bold"
# Style the right status block with Everforest green to separate metadata from windows.
set -g status-right-style "fg=#FFFBEF,bg=#697801"
# Style inactive tabs/windows with subdued Everforest text.
set -g window-status-style "fg=#5C6A72,bg=#FFFDF6"
# Style the active tab/window with Everforest yellow so it is easy to spot.
set -g window-status-current-style "fg=#3D484D,bg=#DFA000,bold"
# Style inactive pane borders with the local Everforest dark gray.
set -g pane-border-style "fg=#5C6A72"
# Style the active pane border with Everforest blue.
set -g pane-active-border-style "fg=#3A94C5"
# Style tmux messages with Everforest yellow for high visibility.
set -g message-style "fg=#3D484D,bg=#DFA000,bold"
# Style tmux command prompts with Everforest yellow for consistency with messages.
set -g message-command-style "fg=#3D484D,bg=#DFA000,bold"
# Style copy/choice mode selection with the local Everforest selection color.
set -g mode-style "fg=#3D484D,bg=#F0F2D4,bold"
# Style copy-mode search matches with Everforest yellow.
set -g copy-mode-match-style "fg=#3D484D,bg=#DFA000"
# Style the current copy-mode search match with Everforest orange.
set -g copy-mode-current-match-style "fg=#FFFBEF,bg=#F57D26,bold"
