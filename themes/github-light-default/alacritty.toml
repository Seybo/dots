# Github Light Default Alacritty colors
# upstream: https://github.com/projekt0n/github-theme-contrib/raw/main/themes/alacritty/github_light_default.yml

[colors.primary]
background = "#ffffff"
foreground = "#1f2328"

[colors.cursor]
text = "#ffffff"
cursor = "#1f2328"

[colors.selection]
text = "#1f2328"
background = "#bbdfff"

[colors.normal]
black = "#24292f"
red = "#cf222e"
green = "#116329"
yellow = "#4d2d00"
blue = "#0969da"
magenta = "#8250df"
cyan = "#1b7c83"
white = "#6e7781"

[colors.bright]
black = "#57606a"
red = "#a40e26"
green = "#1a7f37"
yellow = "#633c01"
blue = "#218bff"
magenta = "#a475f9"
cyan = "#3192aa"
white = "#8c959f"
